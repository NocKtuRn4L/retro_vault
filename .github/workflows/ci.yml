name: CI

on:
  push:
  pull_request:

env:
  PYTHONUTF8: "1"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-24.04, ubuntu-24.04-arm]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1

      - name: Install package (dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover tests -v

      - name: Lint with ruff
        run: ruff check .

      - name: UI import check
        if: hashFiles('retrovault/ui/app.py') != ''
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pip install "PySide6-Essentials>=6.6"
          python -c "import retrovault.ui.app"
